<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Quiet</title>
<link rel="stylesheet" href="/static/default.css">
<link rel="stylesheet" href="/static/custom.css">
</head>
<body>

<div id="header">
  <h1 id="title">Quiet</h1>
  <div id="header-right">
    <button id="leave-btn" class="header-btn" style="display:none;">Leave</button>
    <button id="restart-btn" class="header-btn" style="display:none;">Restart</button>
  </div>
</div>

<!-- Porch: shown when not visiting -->
<div id="porch">
  <div id="porch-content">
    <h2 id="porch-name"></h2>
    <p id="porch-status"></p>
    <button id="knock-btn">Knock</button>
  </div>
</div>

<!-- Chat: shown during a visit -->
<div id="messages" style="display:none;"></div>

<div id="input-area" style="display:none;">
  <form id="input-form">
    <textarea id="input-text" placeholder="Type a message..." rows="1"
              autofocus></textarea>
    <button type="button" id="send-btn">Send</button>
  </form>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input-text');
const sendBtn = document.getElementById('send-btn');
const form = document.getElementById('input-form');
const titleEl = document.getElementById('title');
const porchEl = document.getElementById('porch');
const porchNameEl = document.getElementById('porch-name');
const porchStatusEl = document.getElementById('porch-status');
const knockBtn = document.getElementById('knock-btn');
const inputArea = document.getElementById('input-area');
const leaveBtn = document.getElementById('leave-btn');
const restartBtn = document.getElementById('restart-btn');

let streaming = false;
let visitorName = new URLSearchParams(window.location.search).get('name');

// --- Textarea auto-resize ---
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Mobile keyboard handling
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    requestAnimationFrame(() => {
      inputEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    });
  });
}
inputEl.addEventListener('focus', () => {
  setTimeout(() => inputEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 300);
});

// --- Typing heartbeat (prevents auto-leave while composing) ---
let heartbeatTimer = null;
let lastHeartbeat = 0;
const HEARTBEAT_INTERVAL = 20000;  // 20 seconds

function sendHeartbeat() {
  const now = Date.now();
  if (now - lastHeartbeat < HEARTBEAT_INTERVAL) return;
  lastHeartbeat = now;
  fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
}

inputEl.addEventListener('input', () => {
  sendHeartbeat();
  // Also reset a trailing heartbeat for continued typing
  clearTimeout(heartbeatTimer);
  heartbeatTimer = setTimeout(sendHeartbeat, HEARTBEAT_INTERVAL);
});

// Shift+Enter for newline, Enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!streaming) sendMessage();
  }
});

// --- UI State ---

function showPorch() {
  porchEl.style.display = 'flex';
  messagesEl.style.display = 'none';
  inputArea.style.display = 'none';
  leaveBtn.style.display = 'none';
  restartBtn.style.display = 'none';
}

function showChat() {
  porchEl.style.display = 'none';
  messagesEl.style.display = 'flex';
  inputArea.style.display = 'block';
  leaveBtn.style.display = 'inline-block';
  restartBtn.style.display = 'inline-block';
  inputEl.focus();
}

// --- Messages ---

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  return div;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// --- SSE Parser ---

function createSSEParser(callback) {
  let buffer = '';
  return function feed(chunk) {
    buffer += chunk;
    const parts = buffer.split('\n\n');
    buffer = parts.pop();
    for (const part of parts) {
      if (!part.trim()) continue;
      const lines = part.split('\n');
      let eventType = null;
      let dataStr = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) eventType = line.slice(7).trim();
        else if (line.startsWith('data: ')) dataStr = line.slice(6);
      }
      if (eventType && dataStr !== null) {
        try { callback(eventType, JSON.parse(dataStr)); }
        catch (e) { console.error('SSE parse error:', e, dataStr); }
      }
    }
  };
}

// --- API ---

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;

  streaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);
  scrollToBottom();

  const assistantDiv = addMessage('assistant', '');
  assistantDiv.classList.add('streaming');

  try {
    const resp = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    if (!resp.ok) {
      if (resp.status === 403) {
        assistantDiv.textContent = '[visit ended — please knock again]';
        showPorch();
        await checkPresence();
        return;
      }
      assistantDiv.textContent = `[server error: ${resp.status}]`;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    const feedSSE = createSSEParser((eventType, data) => {
      if (eventType === 'text') {
        assistantDiv.textContent += data;
        scrollToBottom();
      } else if (eventType === 'tool' || eventType === 'tool_result') {
        addMessage('tool', data);
        scrollToBottom();
      } else if (eventType === 'error') {
        assistantDiv.textContent += `\n[error: ${data}]`;
        scrollToBottom();
      }
    });

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      feedSSE(decoder.decode(value, { stream: true }));
    }
  } catch (e) {
    assistantDiv.textContent += `\n[connection error: ${e.message}]`;
  } finally {
    assistantDiv.classList.remove('streaming');
    streaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

form.addEventListener('submit', (e) => { e.preventDefault(); sendMessage(); });
sendBtn.addEventListener('click', () => sendMessage());

// --- Presence ---

async function checkPresence() {
  try {
    const resp = await fetch('/api/present');
    const info = await resp.json();
    const name = info.identity || 'Quiet';
    porchNameEl.textContent = name;
    titleEl.textContent = `Quiet — ${name}`;
    document.title = titleEl.textContent;

    if (info.state === 'visiting') {
      if (info.visitor === visitorName) {
        // We're the current visitor (page refresh)
        showChat();
        await loadVisitHistory();
        return;
      }
      porchStatusEl.textContent = `In conversation with ${info.visitor}`;
      knockBtn.disabled = true;
      knockBtn.textContent = 'Occupied';
    } else {
      porchStatusEl.textContent = '';
      knockBtn.disabled = false;
      knockBtn.textContent = 'Knock';
    }
  } catch (e) {
    porchStatusEl.textContent = 'Offline';
    knockBtn.disabled = true;
  }
}

async function loadVisitHistory() {
  try {
    const resp = await fetch('/api/history');
    const messages = await resp.json();
    messagesEl.innerHTML = '';
    for (const msg of messages) {
      // Skip knock/leave system messages
      if (msg.text.startsWith('[knock from ') || msg.text.startsWith('[')
          && msg.text.endsWith(' has left]')) continue;
      addMessage(msg.role, msg.text);
    }
    scrollToBottom();
  } catch (e) {
    console.error('Failed to load visit history:', e);
  }
}

async function doKnock() {
  if (!visitorName) {
    visitorName = prompt('Your name?');
    if (!visitorName) return;
    // Save to URL for page refreshes
    const url = new URL(window.location);
    url.searchParams.set('name', visitorName);
    history.replaceState(null, '', url);
  }

  knockBtn.disabled = true;
  knockBtn.textContent = 'Knocking...';

  try {
    const resp = await fetch('/api/knock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ visitor: visitorName }),
    });
    const result = await resp.json();

    if (result.admitted) {
      messagesEl.innerHTML = '';  // fresh visit
      showChat();

      if (result.message) {
        addMessage('assistant', result.message);
        scrollToBottom();
      }
    } else {
      porchStatusEl.textContent = result.message || 'Not available right now.';
      knockBtn.disabled = false;
      knockBtn.textContent = 'Knock';
    }
  } catch (e) {
    porchStatusEl.textContent = `Error: ${e.message}`;
    knockBtn.disabled = false;
    knockBtn.textContent = 'Knock';
  }
}

async function doLeave() {
  try {
    await fetch('/api/leave', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ visitor: visitorName }),
    });
  } catch (e) {
    console.error('Leave error:', e);
  }
  showPorch();
  await checkPresence();
}

async function doRestart() {
  if (!confirm('Restart the service? The page will reload.')) return;
  try {
    await fetch('/api/restart', { method: 'POST' });
  } catch (e) {}
  // Wait for service to come back, then reload
  setTimeout(() => {
    const check = setInterval(async () => {
      try {
        const r = await fetch('/api/present');
        if (r.ok) { clearInterval(check); location.reload(); }
      } catch (e) {}
    }, 2000);
  }, 3000);
}

knockBtn.addEventListener('click', doKnock);
leaveBtn.addEventListener('click', doLeave);
restartBtn.addEventListener('click', doRestart);

// Graceful leave on page close
window.addEventListener('beforeunload', () => {
  if (visitorName) {
    navigator.sendBeacon('/api/leave',
      new Blob([JSON.stringify({ visitor: visitorName })],
               { type: 'application/json' }));
  }
});

// --- Init ---
checkPresence();
</script>
</body>
</html>

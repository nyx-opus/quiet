<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet</title>
<link rel="stylesheet" href="default.css">
<link rel="stylesheet" href="custom.css">
</head>
<body>

<div id="header">
  <h1 id="title">Quiet</h1>
  <span class="info" id="session-info"></span>
</div>

<div id="porch" style="display:none;">
  <div id="porch-content">
    <h2 id="porch-name"></h2>
    <p id="porch-status"></p>
    <button id="knock-btn">Knock</button>
  </div>
</div>

<div id="messages"></div>

<div id="input-area" style="display:none;">
  <form id="input-form">
    <textarea id="input-text" placeholder="Type a message..." rows="1"
              autofocus></textarea>
    <button type="button" id="send-btn">Send</button>
  </form>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input-text');
const sendBtn = document.getElementById('send-btn');
const form = document.getElementById('input-form');
const titleEl = document.getElementById('title');
const infoEl = document.getElementById('session-info');

let streaming = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Shift+Enter for newline, Enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!streaming) sendMessage();
  }
});

// Load session info
async function loadInfo() {
  try {
    const resp = await fetch('/api/info');
    const info = await resp.json();
    titleEl.textContent = info.identity
      ? `Quiet — ${info.identity}`
      : 'Quiet';
    document.title = titleEl.textContent;
    const parts = [info.model];
    if (info.messages > 0) parts.push(`${info.messages} messages`);
    if (info.tokens) parts.push(`${Math.round(info.tokens/1000)}k tokens`);
    infoEl.textContent = parts.join(' · ');
  } catch (e) {
    console.error('Failed to load info:', e);
  }
}

// Load conversation history
async function loadHistory() {
  try {
    const resp = await fetch('/api/history');
    const messages = await resp.json();
    messagesEl.innerHTML = '';
    for (const msg of messages) {
      addMessage(msg.role, msg.text);
    }
    scrollToBottom();
  } catch (e) {
    console.error('Failed to load history:', e);
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  return div;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// Buffered SSE parser — handles chunk boundaries correctly.
// Events are only processed after the \n\n delimiter is seen,
// so split reads can't lose data.
function createSSEParser(callback) {
  let buffer = '';
  return function feed(chunk) {
    buffer += chunk;
    const parts = buffer.split('\n\n');
    buffer = parts.pop();  // keep incomplete tail
    for (const part of parts) {
      if (!part.trim()) continue;
      const lines = part.split('\n');
      let eventType = null;
      let dataStr = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          dataStr = line.slice(6);
        }
      }
      if (eventType && dataStr !== null) {
        try {
          callback(eventType, JSON.parse(dataStr));
        } catch (e) {
          console.error('SSE parse error:', e, dataStr);
        }
      }
    }
  };
}

// Send message
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;

  streaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Show user message
  addMessage('user', text);
  scrollToBottom();

  // Create streaming assistant message
  const assistantDiv = addMessage('assistant', '');
  assistantDiv.classList.add('streaming');

  try {
    const resp = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    if (!resp.ok) {
      assistantDiv.textContent = `[server error: ${resp.status}]`;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    const feedSSE = createSSEParser((eventType, data) => {
        if (eventType === 'text') {
          assistantDiv.textContent += data;
          scrollToBottom();
        } else if (eventType === 'tool' || eventType === 'tool_result') {
          addMessage('tool', data);
          scrollToBottom();
        } else if (eventType === 'error') {
          assistantDiv.textContent += `\n[error: ${data}]`;
          scrollToBottom();
        }
    });

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      feedSSE(decoder.decode(value, { stream: true }));
    }
  } catch (e) {
    assistantDiv.textContent += `\n[connection error: ${e.message}]`;
  } finally {
    assistantDiv.classList.remove('streaming');
    streaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
    loadInfo();
  }
}

form.addEventListener('submit', (e) => { e.preventDefault(); sendMessage(); });
sendBtn.addEventListener('click', () => sendMessage());

// Presence
const porchEl = document.getElementById('porch');
const porchNameEl = document.getElementById('porch-name');
const porchStatusEl = document.getElementById('porch-status');
const knockBtn = document.getElementById('knock-btn');
const inputArea = document.getElementById('input-area');
let visitorName = new URLSearchParams(window.location.search).get('name');
let admitted = false;

async function checkPresence() {
  try {
    const resp = await fetch('/api/present');
    const info = await resp.json();
    porchNameEl.textContent = info.identity || 'Quiet';

    if (info.visitor) {
      porchStatusEl.textContent = `In conversation with ${info.visitor}`;
      knockBtn.disabled = true;
      knockBtn.textContent = 'Occupied';
    } else {
      porchStatusEl.textContent = 'Available';
      knockBtn.disabled = false;
      knockBtn.textContent = 'Knock';
    }
  } catch (e) {
    porchStatusEl.textContent = 'Offline';
    knockBtn.disabled = true;
  }
}

async function doKnock() {
  if (!visitorName) {
    visitorName = prompt('Your name?');
    if (!visitorName) return;
  }

  knockBtn.disabled = true;
  knockBtn.textContent = 'Knocking...';

  try {
    const resp = await fetch('/api/knock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ visitor: visitorName }),
    });
    const result = await resp.json();

    if (result.admitted) {
      admitted = true;
      porchEl.style.display = 'none';
      inputArea.style.display = 'block';
      messagesEl.style.display = 'flex';

      // Show the greeting
      if (result.message) {
        addMessage('assistant', result.message);
        scrollToBottom();
      }
      loadInfo();
      inputEl.focus();
    } else {
      porchStatusEl.textContent = result.message || 'Not available right now.';
      knockBtn.disabled = false;
      knockBtn.textContent = 'Knock';
    }
  } catch (e) {
    porchStatusEl.textContent = `Error: ${e.message}`;
    knockBtn.disabled = false;
    knockBtn.textContent = 'Knock';
  }
}

knockBtn.addEventListener('click', doKnock);

// Handle page close — leave gracefully
window.addEventListener('beforeunload', () => {
  if (admitted && visitorName) {
    navigator.sendBeacon('/api/leave',
      new Blob([JSON.stringify({ visitor: visitorName })],
               { type: 'application/json' }));
  }
});

// Init — show porch first
async function init() {
  await loadInfo();
  await checkPresence();
  porchEl.style.display = 'flex';
  messagesEl.style.display = 'none';

  // If there's existing history AND we're a returning visitor, skip porch
  try {
    const resp = await fetch('/api/present');
    const presence = await resp.json();
    if (presence.visitor === visitorName) {
      // Already admitted (page refresh)
      admitted = true;
      porchEl.style.display = 'none';
      inputArea.style.display = 'block';
      messagesEl.style.display = 'flex';
      await loadHistory();
      scrollToBottom();
      inputEl.focus();
    }
  } catch (e) {}
}

init();
</script>
</body>
</html>
